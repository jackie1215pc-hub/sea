<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ディズニーシー アトラクション一覧</title>
<style>
  :root {
    --bg: #f7f8fb;
    --bg2: #ffffff;
    --panel: #ffffff;
    --panel-strong: #ffffff;
    --text: #222222;
    --sub: #666666;
    --line: #e5e7eb;
    --accent: #007aff;
    --good: #22c55e;
    --warn: #f59e0b;
    --bad: #ef4444;
    --chip: #f1f5f9;
    --shadow: 0 6px 16px rgba(0,0,0,.08);
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  }


  body { min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  .app {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 14px 14px 110px;
  }
  .hero {
    position: sticky;
    top: 0;
    z-index: 20;
    margin: -14px -14px 0;
    padding-top: env(safe-area-inset-top);
    background: rgba(255,255,255,.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }

  .heroMap {
    height: 132px;
    background-image: url("map_all.jpg");
    background-size: contain;
    background-position: var(--hero-map-x, 50%) var(--hero-map-y, 50%);
    background-repeat: no-repeat;
    background-color: rgba(255,255,255,.65);
  }

  .searchSection {
    position: relative;
    z-index: 1;
    margin: 12px -14px 12px;
    padding: 10px 14px 12px;
    background: rgba(247,248,251,.95);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }

  .searchRow {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }

  .search {
    width: 100%;
    border: 1px solid var(--line);
    background: #ffffff;
    color: var(--text);
    border-radius: 14px;
    padding: 14px 14px;
    font-size: 16px;
    outline: none;
  }
  .iconBtn, .sortSelect {
    border: 1px solid var(--line);
    background: #ffffff;
    color: var(--text);
    border-radius: 14px;
    padding: 0 14px;
    font-size: 14px;
    min-height: 48px;
  }
  .panel {
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.55);
    border-radius: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;
  }
  .metric { padding: 12px; }
  .metric .label { color: var(--sub); font-size: 12px; }
  .metric .value { margin-top: 6px; font-size: 22px; font-weight: 800; }
  .toolbar { padding: 12px; margin-bottom: 12px; }
  .toolbarGroup + .toolbarGroup { margin-top: 10px; }
  .toolbarLabel { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--chip); border: 1px solid var(--line); color: var(--text);
    border-radius: 999px; padding: 10px 12px; font-size: 13px; min-height: 42px;
  }
  .chip.active {
    background: rgba(124,199,255,.18);
    border-color: rgba(124,199,255,.6);
    box-shadow: inset 0 0 0 1px rgba(124,199,255,.2);
  }
  .chip.segment.active.good { background: rgba(110,231,183,.18); border-color: rgba(110,231,183,.6); }
  .chip.segment.active.warn { background: rgba(251,191,36,.17); border-color: rgba(251,191,36,.6); }
  .sortRow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .resultsHead {
    display: flex; justify-content: space-between; align-items: center; margin: 12px 2px 10px;
    color: var(--sub); font-size: 13px;
  }
  .list { display: grid; gap: 12px; }
  .card {
    padding: 14px;
    position: relative;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .card.cannot {
    opacity: .62;
  }
  .card.closed::after {
    content: "運休"; position: absolute; top: 12px; right: 12px;
    background: rgba(252,165,165,.2); color: #ffd6d6; border: 1px solid rgba(252,165,165,.5);
    border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 700;
  }
  .cardHead { display: flex; align-items: start; gap: 10px; }
  .main { flex: 1; min-width: 0; }
  .nameRow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .star {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 28px; border-radius: 999px; font-weight: 800;
    background: rgba(251,191,36,.18); color: #ffe59a; border: 1px solid rgba(251,191,36,.45);
    font-size: 14px;
  }
  .name { font-size: 18px; font-weight: 800; line-height: 1.35; }
  .meta { margin-top: 4px; color: var(--sub); font-size: 13px; line-height: 1.5; }
  .waitBox {
    min-width: 88px; text-align: center; padding: 10px 8px; border-radius: 16px;
    background: rgba(255,255,255,.06); border: 1px solid var(--line);
  }
  .waitBox .cap { color: var(--sub); font-size: 12px; }
  .waitBox .num { margin-top: 4px; font-size: 28px; font-weight: 800; line-height: 1; }
  .waitBox .unit { font-size: 12px; color: var(--sub); }
  .waitBox.short { background: rgba(110,231,183,.12); border-color: rgba(110,231,183,.32); }
  .waitBox.mid { background: rgba(251,191,36,.11); border-color: rgba(251,191,36,.28); }
  .waitBox.long { background: rgba(252,165,165,.12); border-color: rgba(252,165,165,.28); }
  .statusRow {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px;
  }
  .status {
    background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: 14px; padding: 10px;
  }
  .status .k { color: var(--sub); font-size: 12px; }
  .status .v { margin-top: 5px; font-size: 16px; font-weight: 800; }
  .ok { color: #baf8d6; }
  .ng { color: #ffd1d1; }
  .midtext { color: #ffe4ac; }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  .tag {
    font-size: 12px; color: var(--sub); background: rgba(255,255,255,.05);
    border: 1px solid var(--line); padding: 7px 10px; border-radius: 999px;
  }
  .actions { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 12px; }
  .btn {
    min-height: 44px; border-radius: 14px; border: 1px solid var(--line); display: flex; align-items: center;
    justify-content: center; gap: 6px; font-weight: 700; font-size: 14px;
    background: rgba(255,255,255,.07);
  }
  .btn.primary { background: rgba(124,199,255,.16); border-color: rgba(124,199,255,.45); }
  .btn.small { padding: 0 12px; }
  .empty {
    padding: 24px; text-align: center; color: var(--sub);
  }

  #mapPin {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  #mapPin::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    left: var(--pin-x, 50%);
    top: var(--pin-y, 50%);
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.85);
  }

.footerBar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 25;
  padding: 10px 14px calc(env(safe-area-inset-bottom) + 10px);
  background: linear-gradient(180deg, rgba(247,248,251,0), rgba(247,248,251,.95) 28%);
  backdrop-filter: blur(12px);
}
  .footerInner {
    max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .footerBtn {
    min-height: 48px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.08);
    color: var(--text); font-weight: 700; font-size: 14px;
  }
  dialog {
    width: min(680px, calc(100vw - 20px)); border: 1px solid var(--line); border-radius: 24px;
    background: #111935; color: var(--text); box-shadow: var(--shadow); padding: 0;
  }
  dialog::backdrop { background: rgba(0,0,0,.55); backdrop-filter: blur(2px); }
  .modalHead { padding: 16px 18px 10px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 10px; align-items: start; }
  .modalTitle { font-size: 20px; font-weight: 800; line-height: 1.4; }
  .modalSub { color: var(--sub); margin-top: 4px; font-size: 13px; }
  .modalBody { padding: 16px 18px 18px; }
  .detailGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detailItem { background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
  .detailItem .k { font-size: 12px; color: var(--sub); }
  .detailItem .v { margin-top: 6px; font-size: 16px; font-weight: 800; line-height: 1.5; }
  .modalActions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .closeX { min-width: 42px; min-height: 42px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,.07); color: var(--text); font-size: 22px; line-height: 1; }
  @media (max-width: 640px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .statusRow { grid-template-columns: repeat(2, 1fr); }
    .detailGrid { grid-template-columns: 1fr; }
    .actions { grid-template-columns: 1fr 1fr; }
    .actions .btn.small { grid-column: span 2; }
    .sortRow { grid-template-columns: 1fr; }
    .waitBox { min-width: 76px; }
    .title { font-size: 20px; }

  }
</style>
</head>
<body>

<div class="app">
  <div class="hero">
    <div class="heroMap"></div>
  </div>

  <div class="searchSection">
    <div class="searchRow">
      <input id="searchInput" class="search" type="search" placeholder="アトラクション名・形式・場所で検索">

    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="toolbar panel">

      <div class="toolbarLabel">すばやく絞り込み</div>

      </div>

<div id="mapPin"></div>

  <div class="resultsHead">

  <div id="list" class="list"></div>
</div>

<div class="footerBar">
  <div class="footerInner">
    <button id="showRideableBtn" class="footerBtn" type="button">乗れるのみ</button>
    <button id="showStarBtn" class="footerBtn" type="button">★だけ</button>
    <button id="resetBtn" class="footerBtn" type="button">絞り込み解除</button>
  </div>
</div>

<dialog id="detailDialog">
  <div class="modalHead">
    <div>
      <div id="modalTitle" class="modalTitle"></div>
      <div id="modalSub" class="modalSub"></div>
    </div>
    <button id="closeDialogBtn" class="closeX" type="button" aria-label="閉じる">×</button>
  </div>
  <div class="modalBody">
    <div id="detailGrid" class="detailGrid"></div>
    <div class="modalActions">
      <a id="detailLinkBtn" class="btn primary" target="_blank" rel="noopener noreferrer">詳細ページを開く</a>
      <a id="waitLinkBtn" class="btn" target="_blank" rel="noopener noreferrer">待ち時間ページを開く</a>
    </div>
  </div>
</dialog>

const STORAGE_KEY = 'disneySea-local-ui-state-v1';

const state = {
  search: '',
  area: 'all',
  rideableOnly: false,

  shizukuOk: false,

  closeDialogBtn: document.getElementById('closeDialogBtn'),
};

function loadPersisted() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && typeof saved === 'object') Object.assign(state, saved);
  } catch (e) {}
  try {
    riddenMap = JSON.parse(localStorage.getItem(RIDDEN_KEY) || '{}') || {};
  } catch (e) {
    riddenMap = {};
  }
}

function persistState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function persistRidden() {
  localStorage.setItem(RIDDEN_KEY, JSON.stringify(riddenMap));
}

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[ch]);
}

function waitClass(wait) {
  if (wait == null || wait === '') return '';
  if (wait <= 15) return 'short';
  if (wait <= 45) return 'mid';
  return 'long';
}

function displayWait(wait) {
  if (wait == null || wait === '') return '—';
  return String(wait);
}

function normalize(val) {
  return String(val ?? '').trim();
}

function matchesOk(value) {
  return normalize(value) === '〇' || normalize(value) === '○';
}

function matchesIndoor(value) {
  return normalize(value) === '○' || normalize(value) === '〇';
}

function parseMinutes(text) {
  if (!text) return Number.POSITIVE_INFINITY;
  const m = String(text).match(/(\d+)分/);
  const s = String(text).match(/(\d+)秒/);
  const minutes = m ? Number(m[1]) : 0;
  const seconds = s ? Number(s[1]) : 0;
  return minutes + (seconds / 60);
}

function isRidden(item) {
  return !!riddenMap[item.no];
}

function saveAndRender() {
  persistState();
  persistRidden();
  render();
}

function buildQuickFilters() {
  els.quickFilters.innerHTML = QUICK_FILTERS.map(f => `
    <button type="button" class="chip segment ${state[f.key] ? `active ${f.tone}` : ''}" data-filter-key="${f.key}">
      ${f.label}
    </button>
  `).join('');
  els.quickFilters.querySelectorAll('[data-filter-key]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-filter-key');
      state[key] = !state[key];
      saveAndRender();
    });
  });
}

function buildAreaFilters() {
  const buttons = [`<button type="button" class="chip ${state.area === 'all' ? 'active' : ''}" data-area="all">全部</button>`]
    .concat(AREAS.map(area => `<button type="button" class="chip ${state.area === area ? 'active' : ''}" data-area="${escapeHtml(area)}">${escapeHtml(area)}</button>`));
  els.areaFilters.innerHTML = buttons.join('');
  els.areaFilters.querySelectorAll('[data-area]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.area = btn.getAttribute('data-area');
      saveAndRender();
    });
  });
}

function getFilteredItems() {
  const q = state.search.trim().toLowerCase();
  let items = DATA.filter(item => {
    if (state.area !== 'all' && item.area !== state.area) return false;
    if (state.rideableOnly && (item.cannotRide || item.closed)) return false;
    if (state.starOnly && !item.star) return false;
    if (state.sumireOk && !matchesOk(item.sumire)) return false;
    if (state.shizukuOk && !matchesOk(item.shizuku)) return false;
    if (state.indoorOnly && !matchesIndoor(item.indoor)) return false;
    if (state.notRiddenOnly && isRidden(item)) return false;
    if (q) {
      const target = [item.name, item.area, item.place, item.type].join(' ').toLowerCase();
      if (!target.includes(q)) return false;
    }
    return true;
  });

  items = items.slice().sort((a, b) => {
    if (state.secondarySort === 'starFirst') {
      if (a.star !== b.star) return a.star ? -1 : 1;
    }
    if (state.secondarySort === 'rideableFirst') {
      const ax = (a.cannotRide || a.closed) ? 1 : 0;
      const bx = (b.cannotRide || b.closed) ? 1 : 0;
      if (ax !== bx) return ax - bx;
    }

    switch (state.sort) {
      case 'waitAsc':
        return (a.wait ?? Infinity) - (b.wait ?? Infinity) || a.no - b.no;
      case 'waitDesc':
        return (b.wait ?? -1) - (a.wait ?? -1) || a.no - b.no;
      case 'durationAsc':
        return parseMinutes(a.duration) - parseMinutes(b.duration) || a.no - b.no;
      case 'nameAsc':
        return a.name.localeCompare(b.name, 'ja') || a.no - b.no;
      default:
        return a.no - b.no;
    }
  });

  return items;
}

function renderSummary(items) {
  const rideable = DATA.filter(item => !(item.cannotRide || item.closed)).length;
  const stars = DATA.filter(item => item.star).length;
  const checked = DATA.filter(item => isRidden(item)).length;
  const shortWait = DATA.filter(item => (item.wait ?? Infinity) <= 15 && !(item.cannotRide || item.closed)).length;

  const cards = [
    { label: '表示中', value: items.length },
    { label: '乗れるもの', value: rideable },
    { label: '★', value: stars },
    { label: '短め待ち', value: shortWait },
  ];
  els.summary.innerHTML = cards.map(c => `
    <div class="metric panel">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
    </div>
  `).join('');
}

function renderList(items) {
  els.resultCount.textContent = `${items.length}件`;
  if (!items.length) {
    els.list.innerHTML = '<div class="empty panel">該当するアトラクションがありません。</div>';
    return;
  }

  els.list.innerHTML = items.map(item => {
    const tags = [];
    if (item.type) tags.push(item.type);
    if (item.height) tags.push(item.height);
    if (item.babyCarrier) tags.push(`抱っこひも ${item.babyCarrier}`);
    if (item.lap) tags.push(`膝上 ${item.lap}`);
    if (item.priorityPass) tags.push(`PP ${item.priorityPass}`);
    if (item.indoor) tags.push(`室内 ${item.indoor}`);
    if (item.cannotRide) tags.push('乗れない');
    if (isRidden(item)) tags.push('チェック済み');

    const waitClassName = waitClass(item.wait);
    const riddenLabel = isRidden(item) ? 'チェック解除' : '乗った';
    const sumireClass = matchesOk(item.sumire) ? 'ok' : (normalize(item.sumire) === '△' ? 'midtext' : 'ng');
    const shizukuClass = matchesOk(item.shizuku) ? 'ok' : (normalize(item.shizuku) === '△' ? 'midtext' : 'ng');
    const indoorClass = matchesIndoor(item.indoor) ? 'ok' : 'ng';

    return `
      <article class="card panel ${item.cannotRide ? 'cannot' : ''} ${item.closed ? 'closed' : ''}">
        <div class="cardHead">
          <div class="main">
            <div class="nameRow">
              ${item.star ? '<span class="star">★</span>' : ''}
              <div class="name">${escapeHtml(item.name)}</div>
            </div>
            <div class="meta">${escapeHtml(item.area)} / ${escapeHtml(item.place || '—')}${item.type ? ` / ${escapeHtml(item.type)}` : ''}</div>
          </div>
          <div class="waitBox ${waitClassName}">
            <div class="cap">待ち時間</div>
            <div class="num">${displayWait(item.wait)}</div>
            <div class="unit">${item.wait == null ? '' : '分'}</div>
          </div>
        </div>

        <div class="statusRow">
          <div class="status">
            <div class="k">すみれ</div>
            <div class="v ${sumireClass}">${escapeHtml(item.sumire || '—')}</div>
          </div>
          <div class="status">
            <div class="k">しずく</div>
            <div class="v ${shizukuClass}">${escapeHtml(item.shizuku || '—')}</div>
          </div>
          <div class="status">
            <div class="k">室内</div>
            <div class="v ${indoorClass}">${escapeHtml(item.indoor || '—')}</div>
          </div>
          <div class="status">
            <div class="k">所要時間</div>
            <div class="v">${escapeHtml(item.duration || '—')}</div>
          </div>
        </div>

        <div class="tags">
          ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
        </div>

        <div class="actions">
          <button class="btn primary" type="button" data-open-detail="${item.no}">詳細</button>
          <a class="btn" href="${escapeHtml(item.waitUrl || item.detailUrl || '#')}" target="_blank" rel="noopener noreferrer">${item.waitUrl ? '待ち時間' : 'ページ'}</a>
          <button class="btn small" type="button" data-toggle-ridden="${item.no}">${riddenLabel}</button>
        </div>
      </article>
    `;
  }).join('');

  els.list.querySelectorAll('[data-open-detail]').forEach(btn => {
    btn.addEventListener('click', () => {
      const no = Number(btn.getAttribute('data-open-detail'));
      const item = DATA.find(d => d.no === no);
      if (item) openDetail(item);
    });
  });

  els.list.querySelectorAll('[data-toggle-ridden]').forEach(btn => {
    btn.addEventListener('click', () => {
      const no = Number(btn.getAttribute('data-toggle-ridden'));
      riddenMap[no] = !riddenMap[no];
      saveAndRender();
    });
  });
}

function openDetail(item) {
  els.modalTitle.textContent = item.name;
  els.modalSub.textContent = `${item.area} / ${item.place || '—'}`;

  const detailItems = [
    ['形式', item.type || '—'],
    ['運休', item.closed ? '運休' : '—'],
    ['乗れない', item.cannotRide ? 'はい' : 'いいえ'],
    ['待ち時間', item.wait == null ? '—' : `${item.wait}分`],
    ['所要時間', item.duration || '—'],
    ['すみれ', item.sumire || '—'],
    ['しずく', item.shizuku || '—'],
    ['抱っこひも', item.babyCarrier || '—'],
    ['膝上', item.lap || '—'],
    ['身長', item.height || '—'],
    ['プライオリティパス', item.priorityPass || '—'],
    ['室内', item.indoor || '—'],
  ];

  els.detailGrid.innerHTML = detailItems.map(([k, v]) => `
    <div class="detailItem">
      <div class="k">${escapeHtml(k)}</div>
      <div class="v">${escapeHtml(v)}</div>
    </div>
  `).join('');

  if (item.detailUrl) {
    els.detailLinkBtn.href = item.detailUrl;
    els.detailLinkBtn.style.pointerEvents = '';
    els.detailLinkBtn.style.opacity = '1';
  } else {
    els.detailLinkBtn.removeAttribute('href');
    els.detailLinkBtn.style.pointerEvents = 'none';
    els.detailLinkBtn.style.opacity = '.45';
  }

  if (item.waitUrl) {
    els.waitLinkBtn.href = item.waitUrl;
    els.waitLinkBtn.style.pointerEvents = '';
    els.waitLinkBtn.style.opacity = '1';
  } else {
    els.waitLinkBtn.removeAttribute('href');
    els.waitLinkBtn.style.pointerEvents = 'none';
    els.waitLinkBtn.style.opacity = '.45';
  }

  els.detailDialog.showModal();
}

function closeDetail() {
  if (els.detailDialog.open) els.detailDialog.close();
}

function render() {
  buildQuickFilters();
  buildAreaFilters();
  const items = getFilteredItems();
  renderSummary(items);
  renderList(items);


  const pin = document.getElementById("mapPin");
  const heroMap = document.querySelector(".heroMap");

  const current = items[0];
  if (current && PIN_POS[current.name]) {
    const [x, y] = PIN_POS[current.name];

    pin.style.setProperty('--pin-x', x + '%');
    pin.style.setProperty('--pin-y', y + '%');

    if (heroMap) {
      heroMap.style.setProperty('--hero-map-x', x + '%');
      heroMap.style.setProperty('--hero-map-y', y + '%');
    }
  } else {
    pin.style.setProperty('--pin-x', '50%');
    pin.style.setProperty('--pin-y', '50%');

    if (heroMap) {
      heroMap.style.setProperty('--hero-map-x', '50%');
      heroMap.style.setProperty('--hero-map-y', '50%');
    }
  }

}

function resetFilters() {
  state.search = '';
  state.area = 'all';
  state.rideableOnly = false;
  state.starOnly = false;
  state.sumireOk = false;
  state.shizukuOk = false;
  state.indoorOnly = false;
  state.notRiddenOnly = false;
  state.sort = 'default';
  state.secondarySort = 'none';
  els.searchInput.value = '';
  els.sortSelect.value = 'default';
  els.secondarySortSelect.value = 'none';
  saveAndRender();
}

function bindEvents() {
  els.searchInput.value = state.search;
  els.sortSelect.value = state.sort;
  els.secondarySortSelect.value = state.secondarySort;

  els.searchInput.addEventListener('input', () => {
    state.search = els.searchInput.value;
    saveAndRender();
  });
  els.clearSearchBtn.addEventListener('click', () => {
    state.search = '';
    els.searchInput.value = '';
    saveAndRender();
  });
  els.sortSelect.addEventListener('change', () => {
    state.sort = els.sortSelect.value;
    saveAndRender();
  });
  els.secondarySortSelect.addEventListener('change', () => {
    state.secondarySort = els.secondarySortSelect.value;
    saveAndRender();
  });
  els.showRideableBtn.addEventListener('click', () => {
    state.rideableOnly = !state.rideableOnly;
    saveAndRender();
  });
  els.showStarBtn.addEventListener('click', () => {
    state.starOnly = !state.starOnly;
    saveAndRender();
  });
  els.resetBtn.addEventListener('click', resetFilters);
  els.closeDialogBtn.addEventListener('click', closeDetail);
  els.detailDialog.addEventListener('click', (e) => {
    const rect = els.detailDialog.getBoundingClientRect();
    const isInDialog = rect.top <= e.clientY && e.clientY <= rect.top + rect.height
      && rect.left <= e.clientX && e.clientX <= rect.left + rect.width;
    if (!isInDialog) closeDetail();
  });
}

const PIN_POS = {
  "ソアリン：ファンタスティック・フライト": [45, 55],
  "タワー・オブ・テラー": [20, 65],
  "トイ・ストーリー・マニア！": [25, 60],
  "タートル・トーク": [22, 63]
};

loadPersisted();
bindEvents();
render();
</script>
</body>
</html>
