<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ディズニーシー アトラクション一覧</title>
<style>
  :root {
    --bg: #f7f8fb;
    --bg2: #ffffff;
    --panel: #ffffff;
    --panel-strong: #ffffff;
    --text: #222222;
    --sub: #666666;
    --line: #e5e7eb;
    --accent: #007aff;
    --good: #22c55e;
    --warn: #f59e0b;
    --bad: #ef4444;
    --chip: #f1f5f9;
    --shadow: 0 6px 16px rgba(0,0,0,.08);
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  }


  body { min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  .app {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 14px 14px 110px;
  }
  .hero {
    position: sticky;
    top: 0;
    z-index: 20;
    margin: -14px -14px 0;
    padding-top: env(safe-area-inset-top);
    background: rgba(255,255,255,.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }

.heroMap {
  position: relative;
  width: 100%;
  height: 180px;
  overflow: hidden;
  background: rgba(255,255,255,.65);
}

.heroMap::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 28px;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0) 0%,
    rgba(247,248,251,1) 100%
  );
  pointer-events: none;
  z-index: 2;
}

  .heroMapViewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* テスト */
  .heroMapCanvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    aspect-ratio: 1280 / 1167;
    transform: translate(var(--map-offset-x, 0px), var(--map-offset-y, 0px));
    transition: transform 0.45s ease;
    transform-origin: top left;
    will-change: transform;
  }

    /* .heroMapCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      aspect-ratio: 1280 / 1167;
      transform: none;
      transition: none;
      transform-origin: top left;
      will-change: auto;
    } */

  .heroMapImage {
    position: absolute;
    inset: 0;
    background-image: url("map_all.png");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
  }

  .heroPins {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  .heroPin {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #ff3b30;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.88);
  }

  .heroPinNum {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: #ffffff;
    font-size: 10px;
    font-weight: 800;
    line-height: 1;
  }

  .cardNo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    height: 28px;
    padding: 0 8px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
  }

  .cardNo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    height: 28px;
    padding: 0 8px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
  }

  .searchSection {
    position: relative;
    z-index: 5;
    margin: -24px -14px 12px;
    padding: 10px 14px 12px;
    background: rgba(247,248,251,.95);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }

  .searchSection {
    border-radius: 18px 18px 0 0;
  }

  .searchRow {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }

  .search {
    width: 100%;
    border: 1px solid var(--line);
    background: #ffffff;
    color: var(--text);
    border-radius: 14px;
    padding: 14px 14px;
    font-size: 16px;
    outline: none;
  }
  .iconBtn, .sortSelect {
    border: 1px solid var(--line);
    background: #ffffff;
    color: var(--text);
    border-radius: 14px;
    padding: 0 14px;
    font-size: 14px;
    min-height: 48px;
  }
  .panel {
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.55);
    border-radius: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;
  }
  .metric { padding: 12px; }
  .metric .label { color: var(--sub); font-size: 12px; }
  .metric .value { margin-top: 6px; font-size: 22px; font-weight: 800; }
  .toolbar { padding: 12px; margin-bottom: 12px; }
  .toolbarGroup + .toolbarGroup { margin-top: 10px; }
  .toolbarLabel { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--chip); border: 1px solid var(--line); color: var(--text);
    border-radius: 999px; padding: 10px 12px; font-size: 13px; min-height: 42px;
  }
  .chip.active {
    background: rgba(124,199,255,.18);
    border-color: rgba(124,199,255,.6);
    box-shadow: inset 0 0 0 1px rgba(124,199,255,.2);
  }
  .chip.segment.active.good { background: rgba(110,231,183,.18); border-color: rgba(110,231,183,.6); }
  .chip.segment.active.warn { background: rgba(251,191,36,.17); border-color: rgba(251,191,36,.6); }
  .sortRow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .resultsHead {
    display: flex; justify-content: space-between; align-items: center; margin: 12px 2px 10px;
    color: var(--sub); font-size: 13px;
  }
  .list { display: grid; gap: 12px; }
  .card {
    padding: 10px;
    position: relative;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .card.cannot {
    opacity: .62;
  }

.card.is-dimmed {
  opacity: 1;
  background: rgba(180, 180, 180, 0.6);
  filter: grayscale(100%);
}

  .cardOverlayLabel {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: .04em;
    text-shadow: 0 1px 4px rgba(0,0,0,.35);
    pointer-events: none;
  }
  .card.closed::after {
    content: none;
  }
  .cardHead {
    display: flex;
    align-items: start;
    gap: 8px;
  }
  .main { flex: 1; min-width: 0; }
  .nameRow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .star {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 28px; border-radius: 999px; font-weight: 800;
    background: rgba(251,191,36,.18); color: #ffe59a; border: 1px solid rgba(251,191,36,.45);
    font-size: 14px;
  }
  .name { font-size: 18px; font-weight: 800; line-height: 1.35; }
  .meta {
    margin-top: 2px;
    font-size: 12px;
  }
  .waitBox {
    min-width: 88px; text-align: center; padding: 10px 8px; border-radius: 16px;
    background: rgba(255,255,255,.06); border: 1px solid var(--line);
  }
  .waitBox .cap { color: var(--sub); font-size: 12px; }
  .waitBox .num { margin-top: 4px; font-size: 28px; font-weight: 800; line-height: 1; }
  .waitBox .unit { font-size: 12px; color: var(--sub); }
  .waitBox.short { background: rgba(110,231,183,.12); border-color: rgba(110,231,183,.32); }
  .waitBox.mid { background: rgba(251,191,36,.11); border-color: rgba(251,191,36,.28); }
  .waitBox.long { background: rgba(252,165,165,.12); border-color: rgba(252,165,165,.28); }
  .statusRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .status {
    background: rgba(255,255,255,.05);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 7px 9px;
  }
  .status .k {
    color: var(--sub);
    font-size: 11px;
    line-height: 1.2;
  }
  .status .v {
    margin-top: 3px;
    font-size: 15px;
    font-weight: 800;
    line-height: 1.2;
  }
  .ok { color: #baf8d6; }
  .ng { color: #ffd1d1; }
  .midtext { color: #ffe4ac; }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .tag {
    font-size: 12px; color: var(--sub); background: rgba(255,255,255,.05);
    border: 1px solid var(--line); padding: 7px 10px; border-radius: 999px;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .btn {
    min-height: 44px; border-radius: 14px; border: 1px solid var(--line); display: flex; align-items: center;
    justify-content: center; gap: 6px; font-weight: 700; font-size: 14px;
    background: rgba(255,255,255,.07);
  }
  .btn.primary { background: rgba(124,199,255,.16); border-color: rgba(124,199,255,.45); }
  .btn.small {
    min-height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    font-size: 12px;
  }
  .empty {
    padding: 24px; text-align: center; color: var(--sub);
  }

.footerBar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 25;
  padding: 10px 14px calc(env(safe-area-inset-bottom) + 10px);
  background: linear-gradient(180deg, rgba(247,248,251,0), rgba(247,248,251,.95) 28%);
  backdrop-filter: blur(12px);
}
  .footerInner {
    max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .footerBtn {
    min-height: 48px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.08);
    color: var(--text); font-weight: 700; font-size: 14px;
  }
  dialog {
    width: min(680px, calc(100vw - 20px)); border: 1px solid var(--line); border-radius: 24px;
    background: #111935; color: var(--text); box-shadow: var(--shadow); padding: 0;
  }
  dialog::backdrop { background: rgba(0,0,0,.55); backdrop-filter: blur(2px); }
  .modalHead { padding: 16px 18px 10px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 10px; align-items: start; }
  .modalTitle { font-size: 20px; font-weight: 800; line-height: 1.4; }
  .modalSub { color: var(--sub); margin-top: 4px; font-size: 13px; }
  .modalBody { padding: 16px 18px 18px; }
  .detailGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detailItem { background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
  .detailItem .k { font-size: 12px; color: var(--sub); }
  .detailItem .v { margin-top: 6px; font-size: 16px; font-weight: 800; line-height: 1.5; }
  .modalActions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .closeX { min-width: 42px; min-height: 42px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,.07); color: var(--text); font-size: 22px; line-height: 1; }
  @media (max-width: 640px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .statusRow { grid-template-columns: repeat(3, 1fr); }
    .detailGrid { grid-template-columns: 1fr; }
    .actions { grid-template-columns: 1fr 1fr; }
    .actions .btn.small { grid-column: span 2; }
    .sortRow { grid-template-columns: 1fr; }
    .waitBox { min-width: 76px; }
    .title { font-size: 20px; }

  }
</style>
</head>
<body>

<div class="app">
  <div class="hero">
    <div class="heroMap">
      <div class="heroMapViewport">
        <div id="heroMapCanvas" class="heroMapCanvas">
          <div class="heroMapImage"></div>
          <div id="heroPins" class="heroPins"></div>
        </div>
      </div>
    </div>
  </div>

      <div class="sortRow">

          <option value="nameAsc">名前順</option>

        <select id="secondarySortSelect" class="sortSelect">

          <option value="starFirst">★を先頭に</option>
          <option value="rideableFirst">乗れるものを先頭に</option>
        </select>
      </div>
    </div>
  </div>

  <div class="resultsHead">
    <div id="resultCount">0件</div>
    <div id="resultHint"></div>
  </div>

  <div id="list" class="list"></div>
</div>

<div class="footerBar">
  <div class="footerInner">
    <button id="showRideableBtn" class="footerBtn" type="button">乗れるのみ</button>
    <button id="showStarBtn" class="footerBtn" type="button">★だけ</button>
    <button id="resetBtn" class="footerBtn" type="button">絞り込み解除</button>
  </div>
</div>

function getNowTimeSlot() {
  const now = new Date()
  const h = now.getHours()
  const m = now.getMinutes()

  const total = h * 60 + m

  const slots = [
    510, 540, 570, 600, 630, 660, 690, 720,
    750, 780, 810, 840, 870, 900, 930, 960,
    990, 1020, 1050, 1080, 1110, 1140
  ]

  let closest = slots[0]
  let minDiff = Infinity

  slots.forEach(s => {
    const diff = Math.abs(total - s)
    if (diff < minDiff) {
      minDiff = diff
      closest = s
    }
  })

  return closest
}

function getDynamicWait(item) {
  const now = new Date()
  const h = now.getHours()
  const m = now.getMinutes()

  const total = h * 60 + m

  const slots = [
    "0830","0900","0930","1000","1030","1100","1130","1200",
    "1230","1300","1330","1400","1430","1500","1530","1600",
    "1630","1700","1730","1800","1830","1900"
  ]

  const minutesMap = {
    "0830": 510, "0900": 540, "0930": 570, "1000": 600,
    "1030": 630, "1100": 660, "1130": 690, "1200": 720,
    "1230": 750, "1300": 780, "1330": 810, "1400": 840,
    "1430": 870, "1500": 900, "1530": 930, "1600": 960,
    "1630": 990, "1700": 1020, "1730": 1050, "1800": 1080,
    "1830": 1110, "1900": 1140
  }

  let closest = slots[0]
  let minDiff = Infinity

  slots.forEach(s => {
    const diff = Math.abs(total - minutesMap[s])
    if (diff < minDiff) {
      minDiff = diff
      closest = s
    }
  })

  return item['wait' + closest]
}

function loadPersisted() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && typeof saved === 'object') Object.assign(state, saved);
  } catch (e) {}
  try {
    riddenMap = JSON.parse(localStorage.getItem(RIDDEN_KEY) || '{}') || {};
  } catch (e) {
    riddenMap = {};
  }
}

function persistState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function persistRidden() {
  localStorage.setItem(RIDDEN_KEY, JSON.stringify(riddenMap));
}

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[ch]);
}

function waitClass(wait) {
  if (wait == null || wait === '') return '';
  if (wait <= 15) return 'short';
  if (wait <= 45) return 'mid';
  return 'long';
}

function displayWait(val) {
  if (val === '' || val == null) return '--'
  return val
}

function normalize(val) {
  return String(val ?? '').trim();
}

function matchesOk(value) {
  return normalize(value) === '〇' || normalize(value) === '○';
}

function matchesIndoor(value) {
  return normalize(value) === '○' || normalize(value) === '〇';
}

function parseMinutes(text) {
  if (!text) return Number.POSITIVE_INFINITY;
  const m = String(text).match(/(\d+)分/);
  const s = String(text).match(/(\d+)秒/);
  const minutes = m ? Number(m[1]) : 0;
  const seconds = s ? Number(s[1]) : 0;
  return minutes + (seconds / 60);
}

function isRidden(item) {
  return !!riddenMap[item.no];
}

function saveAndRender() {
  persistState();
  persistRidden();
  render();
}

    </button>
  `).join('');
  els.quickFilters.querySelectorAll('[data-filter-key]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-filter-key');
      state[key] = !state[key];
      saveAndRender();
    });
  });
}

function buildAreaFilters() {
  const buttons = [`<button type="button" class="chip ${state.area === 'all' ? 'active' : ''}" data-area="all">全部</button>`]
    .concat(AREAS.map(area => `<button type="button" class="chip ${state.area === area ? 'active' : ''}" data-area="${escapeHtml(area)}">${escapeHtml(area)}</button>`));
  els.areaFilters.innerHTML = buttons.join('');
  els.areaFilters.querySelectorAll('[data-area]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.area = btn.getAttribute('data-area');
      saveAndRender();
    });
  });
}

function getFilteredItems() {
  const q = state.search.trim().toLowerCase();
  let items = DATA.filter(item => {
    if (state.area !== 'all' && item.area !== state.area) return false;
    if (state.rideableOnly && (item.cannotRide || item.closed)) return false;
    if (state.starOnly && !item.star) return false;
    if (state.sumireOk && !matchesOk(item.sumire)) return false;
    if (state.shizukuOk && !matchesOk(item.shizuku)) return false;
    if (state.indoorOnly && !matchesIndoor(item.indoor)) return false;
    if (state.notRiddenOnly && isRidden(item)) return false;
    if (q) {
      const target = [item.name, item.area, item.place, item.type].join(' ').toLowerCase();
      if (!target.includes(q)) return false;
    }
    return true;
  });

  items = items.slice().sort((a, b) => {
    if (state.secondarySort === 'starFirst') {
      if (a.star !== b.star) return a.star ? -1 : 1;
    }
    if (state.secondarySort === 'rideableFirst') {
      const ax = (a.cannotRide || a.closed) ? 1 : 0;
      const bx = (b.cannotRide || b.closed) ? 1 : 0;
      if (ax !== bx) return ax - bx;
    }

    switch (state.sort) {
      case 'waitAsc':
        return (a.wait ?? Infinity) - (b.wait ?? Infinity) || a.no - b.no;
      case 'waitDesc':
        return (b.wait ?? -1) - (a.wait ?? -1) || a.no - b.no;
      case 'durationAsc':
        return parseMinutes(a.duration) - parseMinutes(b.duration) || a.no - b.no;
      case 'nameAsc':
        return a.name.localeCompare(b.name, 'ja') || a.no - b.no;
      default:
        return a.no - b.no;
    }
  });

  return items;
}

function renderSummary(items) {
  const rideable = DATA.filter(item => !(item.cannotRide || item.closed)).length;
  const stars = DATA.filter(item => item.star).length;
  const checked = DATA.filter(item => isRidden(item)).length;
  const shortWait = DATA.filter(item => (item.wait ?? Infinity) <= 15 && !(item.cannotRide || item.closed)).length;

  const cards = [
    { label: '表示中', value: items.length },
    { label: '乗れるもの', value: rideable },
    { label: '★', value: stars },
    { label: '短め待ち', value: shortWait },
  ];
  els.summary.innerHTML = cards.map(c => `
    <div class="metric panel">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
    </div>
  `).join('');
}

function renderList(items) {
  els.resultCount.textContent = `${items.length}件`;
  if (!items.length) {
    els.list.innerHTML = '<div class="empty panel">該当するアトラクションがありません。</div>';
    return;
  }

  els.list.innerHTML = items.map(item => {
  const tags = [];

  if (item.sumire) tags.push(`すみれ ${item.sumire}`);
  if (item.shizuku) tags.push(`しずく ${item.shizuku}`);

  if (item.type) tags.push(item.type);
  if (item.height) tags.push(item.height);
  if (item.babyCarrier) tags.push(`抱っこひも ${item.babyCarrier}`);
  if (item.lap) tags.push(`膝上 ${item.lap}`);
  if (item.priorityPass) tags.push(`PP ${item.priorityPass}`);

  if (item.duration) tags.push(`所要時間 ${item.duration}`);
  if (item.cannotRide) tags.push('乗れない');
  // if (isRidden(item)) tags.push('チェック済み');

    const waitClassName = waitClass(item.wait);
    const riddenLabel = isRidden(item) ? 'チェック解除' : '乗った';

    const isDimmed = item.closed || isRidden(item);
    const overlayLabel = item.closed ? '運休' : (isRidden(item) ? '乗った' : '');

    const waitBoxHtml = item.waitUrl
      ? `<a class="waitBox ${waitClassName}" href="${escapeHtml(item.waitUrl)}" target="_blank" rel="noopener noreferrer">
          <div class="cap">平均待ち</div>
          <div class="num">${displayWait(getDynamicWait(item))}</div>
          <div class="unit">${getDynamicWait(item) == null ? '' : '分'}</div>
        </a>`
      : `<div class="waitBox ${waitClassName}">
          <div class="cap">平均待ち</div>
          <div class="num">${displayWait(getDynamicWait(item))}</div>
          <div class="unit">${getDynamicWait(item) == null ? '' : '分'}</div>
        </div>`;

    return `
      <article class="card panel ${item.cannotRide ? 'cannot' : ''} ${item.closed ? 'closed' : ''} ${isDimmed ? 'is-dimmed' : ''}" data-name="${escapeHtml(item.name)}">
        ${overlayLabel ? `<div class="cardOverlayLabel">${overlayLabel}</div>` : ''}
        <div class="cardHead">
          <div class="main">
            <div class="nameRow">
              <span class="cardNo">No.${item.no}</span>
              <button class="btn small" type="button" data-toggle-ridden="${item.no}">${riddenLabel}</button>
              ${item.star ? '<span class="star">★</span>' : ''}
              <a class="name" href="${escapeHtml(item.detailUrl || '#')}" target="_blank" rel="noopener noreferrer">
                ${escapeHtml(item.name)}
              </a>
            </div>
            <div class="meta">${escapeHtml(item.area)} / ${escapeHtml(item.place || '—')}</div>
          </div>
          ${waitBoxHtml}
        </div>

        <div class="tags">
          ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
        </div>
      </article>
    `;
  }).join('');

  els.list.querySelectorAll('[data-toggle-ridden]').forEach(btn => {
    btn.addEventListener('click', () => {
      const no = Number(btn.getAttribute('data-toggle-ridden'));
      riddenMap[no] = !riddenMap[no];
      saveAndRender();
    });
  });
}

function renderVisiblePins() {
  const heroPins = document.getElementById('heroPins');
  const heroMap = document.querySelector('.heroMap');
  const heroMapCanvas = document.getElementById('heroMapCanvas');
  if (!heroPins || !heroMap || !heroMapCanvas) return;

  const cards = Array.from(document.querySelectorAll('.card[data-name]'));
  const candidates = [];

  cards.forEach((card) => {
    const rect = card.getBoundingClientRect();
    const cardCenterY = rect.top + rect.height / 2;
    const viewportCenterY = window.innerHeight / 2;
    const centerBandHalf = window.innerHeight * 0.18;

    const isNearCenter =
      cardCenterY >= viewportCenterY - centerBandHalf &&
      cardCenterY <= viewportCenterY + centerBandHalf;

    if (isNearCenter) {
      const name = card.getAttribute('data-name');
      const noText = card.querySelector('.cardNo')?.textContent || '';
      const noMatch = noText.match(/\d+/);
      const no = noMatch ? Number(noMatch[0]) : null;

      if (no != null && PIN_POS[no]) {
        const [x, y] = PIN_POS[no];
        const distance = Math.abs(cardCenterY - viewportCenterY);
        candidates.push({ name, no, x, y, distance });
      }
    }
  });

  candidates.sort((a, b) => a.distance - b.distance);

  const pinItems = [];
  const used = new Set();

  candidates.forEach((item) => {
    if (!used.has(item.no) && pinItems.length < 8) {
      used.add(item.no);
      pinItems.push(item);
    }
  });

  const focusItem = pinItems[0] || null;

  heroPins.innerHTML = pinItems.map((item) => {
    return `
      <span class="heroPin" style="left:${item.x}%; top:${item.y}%;" title="${escapeHtml(item.name)}">
        <span class="heroPinNum">${item.no ?? ''}</span>
      </span>
    `;
  }).join('');

  const mapWidth = heroMap.clientWidth;
  const mapHeight = Math.round(mapWidth * 1167 / 1280);
  const viewportHeight = heroMap.clientHeight;

  if (focusItem) {
    const targetX = mapWidth * (focusItem.x / 100);
    const targetY = mapHeight * (focusItem.y / 100);

    const offsetX = mapWidth / 2 - targetX;
    const offsetY = viewportHeight / 2 - targetY;

    const minOffsetX = mapWidth - mapWidth;
    const maxOffsetX = 0;
    const minOffsetY = viewportHeight - mapHeight;
    const maxOffsetY = 0;

    const clampedX = Math.min(maxOffsetX, Math.max(minOffsetX, offsetX));
    const clampedY = Math.min(maxOffsetY, Math.max(minOffsetY, offsetY));

    heroMapCanvas.style.setProperty('--map-offset-x', `${clampedX}px`);
    heroMapCanvas.style.setProperty('--map-offset-y', `${clampedY}px`);
  } else {
    const centeredY = Math.min(0, Math.max(viewportHeight - mapHeight, (viewportHeight - mapHeight) / 2));
    heroMapCanvas.style.setProperty('--map-offset-x', `0px`);
    heroMapCanvas.style.setProperty('--map-offset-y', `${centeredY}px`);
  }
}

function render() {
  buildQuickFilters();
  buildAreaFilters();
  const items = getFilteredItems();
  renderSummary(items);
  renderList(items);

  renderVisiblePins();
}

function resetFilters() {
  state.search = '';
  state.area = 'all';
  state.rideableOnly = false;
  state.starOnly = false;
  state.sumireOk = false;
  state.shizukuOk = false;
  state.indoorOnly = false;
  state.notRiddenOnly = false;
  state.sort = 'default';
  state.secondarySort = 'none';
  els.searchInput.value = '';
  els.sortSelect.value = 'default';
  els.secondarySortSelect.value = 'none';
  saveAndRender();
}

function bindEvents() {
  els.searchInput.value = state.search;
  els.sortSelect.value = state.sort;
  els.secondarySortSelect.value = state.secondarySort;

  els.searchInput.addEventListener('input', () => {
    state.search = els.searchInput.value;
    saveAndRender();
  });
  els.clearSearchBtn.addEventListener('click', () => {
    state.search = '';
    els.searchInput.value = '';
    saveAndRender();
  });
  els.sortSelect.addEventListener('change', () => {
    state.sort = els.sortSelect.value;
    saveAndRender();
  });
  els.secondarySortSelect.addEventListener('change', () => {
    state.secondarySort = els.secondarySortSelect.value;
    saveAndRender();
  });
  els.showRideableBtn.addEventListener('click', () => {
    state.rideableOnly = !state.rideableOnly;
    saveAndRender();
  });
  els.showStarBtn.addEventListener('click', () => {
    state.starOnly = !state.starOnly;
    saveAndRender();
  });
  els.resetBtn.addEventListener('click', resetFilters);
  window.addEventListener('scroll', renderVisiblePins, { passive: true });
  window.addEventListener('resize', renderVisiblePins);
}
